<section class="doctor-section">

    <div class="header-row">
        <h2 class="section-title">Surgeon Specialists</h2>

        <input type="text"
               class="search-input"
               placeholder="Search surgeon..."
               [(ngModel)]="searchText"
               (input)="onSearch()" />
    </div>

    <!-- No doctors message -->
    <div *ngIf="filteredDoctors.length === 0"
         style="text-align:center;padding:40px;">
        <p>No doctors found near your location.</p>
    </div>

    <!-- Doctor grid -->
    <div class="doctor-grid" *ngIf="filteredDoctors.length > 0">

        <div class="doctor-card"
             *ngFor="let doctor of filteredDoctors"
             #doctorCard>

            <div class="doctor-image-wrapper">
                <img [src]="doctor.image" alt="doctor">
            </div>

            <div class="doctor-info">

                <h3>{{doctor.name}}</h3>

                <p class="degree">{{doctor.degree}}</p>

                <p>🏥 {{doctor.hospital}}</p>

                <p>🩺 {{doctor.specialization}}</p>

                <p>⏱ {{doctor.experience}} years experience</p>

                <p>⭐ {{doctor.rating}}</p>

                <p>📍 {{doctor.distance}} km away</p>

            </div>

        </div>

    </div>

</section>
